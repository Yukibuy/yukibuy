[build]
  functions = "netlify/functions"
  publish = "."

[build.environment]
  NODE_VERSION = "18"

# Pretty URLs (clean URLs without .html extension)
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

# Redirections pour les functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Gestion upload fichiers
[[redirects]]
  from = "/upload"
  to = "/.netlify/functions/upload-csv"
  status = 200

# Sitemap and llms.txt
[[redirects]]
  from = "/sitemap"
  to = "/sitemap.xml"
  status = 301

# Page redirects (explicit for SEO)
[[redirects]]
  from = "/mini-audit"
  to = "/mini-audit-publicitaire"
  status = 301

[[redirects]]
  from = "/audit"
  to = "/mini-audit-publicitaire"
  status = 301

[[redirects]]
  from = "/calculateur"
  to = "/calculateur-roas-reel"
  status = 301

[[redirects]]
  from = "/exemple"
  to = "/exemple-rapport-audit-publicitaire"
  status = 301

# Headers de sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
# Headers spécifiques pour uploads
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://yukibuy.com"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

# Gestion des fichiers CSV uploadés
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

# Règles de cache
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"